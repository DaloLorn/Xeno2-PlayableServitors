$schema: 0.4.0
$aliases:
  SmallBody: &SmallBody { :BodySize: small }
  HeraldRank: &HeraldRank { :Rank: servitor }
  HarbingerRank: &HarbingerRank { :Rank: servitor_heavy }
  DefaultArmourValueType: &DefaultArmourValueType 
    $valuetype: Common.Content.AssetReference`1[[Artitas.Template, Assembly-CSharp, Version=0.0.0.0, Culture=neutral, PublicKeyToken=null]]

groundcombat:
  actor/combatant/mechanical/xenonaut:
    # Herald GC
    servitor:
      parent:
        screen: GC
        path: masters/actor/combatant/drone/servitor
      name: default
      $path: default
      components:
        <<: # Merging aliases in!
          - *SmallBody
          - *HeraldRank
        :Name: Herald Support Platform
        :LocalizableGUID: []
        :IgnoredValidators:
          - Common.Validation.TemplateValidators.PrototypeComponentValidator
        :PortraitLayers:
          - ST-::-ui/portraits/character/ares^head.png
        :GCCombatantMeta: Move,Turn,VaultEqual,ClimbDescending,ClimbAscending,Interact,Flying,EMPVulnerable,PsionicInvulnerable,InvisibleInventory,InjuryImmune,AlwaysHovering
        :RecoveredBody:
          Dead:
            :ar_Template:
              screen: GC
              path: item/corpse/corpse_servitor
        :TemplateEditorDecorators:
          - :22:
              Guid: 3d921750-e11d-4866-9691-8de0f689357d
              Name: null
              Tooltip: null
              Icon: null
              IsDefault: false
              Views:
                - InventorySetup: External
                  Structure:
                    :ar_Template:
                      screen: GC
                      path: masters/loadout/combatant/structure/mechanical
                  Name: Mechanical Inventory
                  AllowedSlotTypes:
                    - :21:
                        DefaultSize: 1
                        Type:
                          :CombatantSlots: Primary
                    - :21:
                        DefaultSize: 1
                        Type:
                          :CombatantSlots: Secondary
                    - :21:
                        DefaultSize: 1
                        Type:
                          :CombatantSlots: Armour
                  RequestStrategy:
                    :82: {}
              DefaultCategory:
                Value: 0
                IsSet: false
        :TemplateRelationships:
          OneLinkTemplates: {}
          ManyLinkTemplates:
            Xenonauts.Common.Components.Item.InventorySlotsLink:
              - :0:
                  Value:
                    Parent:
                      :ar_Template:
                        screen: GC
                        path: masters/loadout/combatant/structure/slot_armor
                    _components: []
              - :0:
                  Value:
                    Parent:
                      :ar_Template:
                        screen: GC
                        path: masters/loadout/combatant/structure/slot_primary
                    _components: []
              - :0:
                  Value:
                    Parent:
                      :ar_Template:
                        screen: GC
                        path: masters/loadout/combatant/structure/slot_secondary
                    _components: []
          ShallowReferenceTemplates: {}
          ListTemplates: {}

    # Harbinger GC
    servitor_heavy:
      parent:
        screen: GC
        path: actor/combatant/mechanical/xenonaut/servitor/default
      name: default
      $path: default
      components:
        <<: 
          - *HarbingerRank
        :Name: Harbinger Support Platform

strategy:
  # Playable Servitor ST Master
  masters:
    parent:
      screen: ST
      path: masters/actor/combatant/combatant
    name: servitor
    $path: actor/combatant/mechanical/xenonauts/servitor
    components:
      <<:
        - *SmallBody
      :Age:
        _min: 0
        _val: 0
        _max: 0
      :BodyID:
        species: servitor
        group: default
        ethnicity: default
        gender: default
      :CombatantMeta: StressImmune,MoraleImmune
      :CombatRating:
        _min: 1
        _val: 1
        _max: 1
      :DefaultLoadoutProfile:
        Target: ST-::-loadout_profiles/heavy.json
        $valuetype: Xenonauts.Strategy.Components.ReferencedDefaultLoadoutProfileStrategy
      :DivisionType: Soldier
      :Expense: 5000
      :InventoryTaxonomy: Loadout/Combatant/Mechanical
      :MechanicalActorAssignmentFSM:
        TriggerEffects: {}
        EntryEffects: {}
        ExitEffects: {}
        State: Available
      :Nationality: None
      :NightVisionRange:
        _min: 0
        _val: 10
        _max: 99
      :Cash:
        _min: 0
        _val: 0
        _max: 0
      :PersonnelCapacity:
        _min: 0
        _val: 0
        _max: 0
      :Quantity:
        _min: 1
        _val: 1
        _max: 1
      :Rank: private
      :SellPrice: 10000
      :SellPriceTransactionDelta: 0
      :SellPriceMin: 0.4
      :SortOrder: 250
      :SCombatantMeta:
        FullRecover,DisableLoadoutProfiles,NoExperienceGain,NoMedalGain,DisableCarryCapacity
      :SItemMeta: ""
      :Strength:
        _min: 50
        _val: 50
        _max: 50
      :UnmodifiedHitPoints:
        _min: 60
        _val: 60
        _max: 60
      :Weight:
        _min: 1
        _val: 1
        _max: 1
      :FundingCategory: Expenses/Vehicles
      :SellPriceMax: 1


  actor/combatant/mechanical/xenonauts:
    # Herald ST
    servitor:
      parent:
        screen: ST
        path: masters/actor/combatant/mechanical/xenonauts/servitor
      name: servitor
      $path: ""
      components:
        <<:
          - *HeraldRank
        :Accuracy:
          _min: 55
          _val: 55
          _max: 55
        :Bravery:
          _min: 100
          _val: 100
          _max: 100
        :DefaultArmour:
          $content: GC-::-item/armour/servitor.json
          <<: *DefaultArmourValueType
        :DefaultLoadoutProfile:
          Target: ST-::-loadout_profiles/servitor.json
          $valuetype: Xenonauts.Strategy.Components.ReferencedDefaultLoadoutProfileStrategy
        :HitPoints:
          _min: 60
          _val: 60
          _max: 60
        :KeyedCounter:
          Herald: 0
        :NameFormatter: Herald {Herald}
        :PortraitLayers:
          - ST-::-ui/portraits/character/mars^head.png
        :Reflexes:
          _min: 50
          _val: 50
          _max: 50
        :SellPrice: 50000
        :SortOrder: 2098
        :SItemMeta: Transferable,Sellable,Unique
        :TimeUnits:
          _min: 60
          _val: 60
          _max: 60
        :GCCombatantMeta: Flying

    # Harbinger ST
    servitor_heavy:
      parent:
        screen: ST
        path: actor/combatant/mechanical/xenonauts/servitor
      name: servitor_heavy
      $path: ""
      components:
        <<:
          - *HarbingerRank
        :DefaultArmour:
          $content: GC-::-item/armour/servitor_heavy.json
          <<: *DefaultArmourValueType
        :DefaultLoadoutProfile:
          Target: ST-::-loadout_profiles/servitor_heavy.json
          $valuetype: Xenonauts.Strategy.Components.ReferencedDefaultLoadoutProfileStrategy
        :HitPoints:
          _min: 120
          _val: 120
          _max: 120
        :KeyedCounter:
          Harbinger: 0
        :NameFormatter: Harbinger {Harbinger}
        :SortOrder: 2099
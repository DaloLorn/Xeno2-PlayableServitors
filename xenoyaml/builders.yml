$schema: 0.4.0
$builders:
  # Disables localization on the template.
  $NoLocale:
    :LocalizableGUID: []

  # Adds an unlock check for whether the player meets all of the specified conditions.
  # These can technically be non-tech things, but whatever.
  $HasTechs:
    $args: 
      - $techs
    :ADelegatePq:
      Operator: All
      Number: 0
      selector:
        :PlayerSe:
          Player: xenonauts
      Variant: Unlocks
      modifierStorage: null
      prerequisites: $techs

  # Adds an unlock check for whether the player has completed a project.
  # (Meant to be used with $HasTechs or other ADelegatePqs.)
  $HasTech:
    $args:
      - $pack
      - $tech
    :ProjectPq:
      Project:
        :ar_Template:
          pack: $pack
          screen: ST
          path: $tech
      Status: Finished
      Variant: Unlocks
      modifierStorage: null
      
  # Checks whether all costs of a project are met.
  # Uses $HasTechs under the hood as a stress test,
  # because they're basically the same otherwise.
  $HasCosts:
    $args:
      - $costs
    $HasTechs:
      :ADelegatePq:
        Variant: Cost
      $techs: $costs

  # Checks whether the player has enough cash to pay for the project.
  # Should be used inside a $HasCosts.
  $CashCost:
    $args:
      - $amount
    :CashPq:
      value: $amount
      Variant: Cost
      modifierStorage: null

  # Generates and recruits new actors at the selected base.
  $RecruitActor:
    $args:
      - $amount
      - $pack
      - $actor
    :BinaryArgsDelegateEffect:
      Arg0Selector:
        :PlayerSe:
          Player: xenonauts
      Arg1Selector:
        :MyGeoBaseSe:
          Target: null
      Effect:
        :GenerateAndRecruitActorEffect:
          Quantity:
            _min: $amount
            _val: $amount
            _max: $amount
          TemplateRef:
            :ar_Template:
              pack: $pack
              screen: ST
              path: $actor
          IgnoreCost: true
          Delayed: false
          Randomize: true
          modifierStorage: null
      modifierStorage: null

  # Executes a delegate effect on the selected base.
  $MyBaseEffect:
    $args:
      - $effects
    :ADelegateEffect:
      selector:
        :MyGeoBaseSe:
          Target: null
      effects: $effects
      modifierStorage: null
  
  # Adds new items to the selected base's inventory.
  # (Should be invoked inside a MyBaseEffect or similar.)
  $AddItem:
    $args:
      - $amount
      - $pack
      - $item
    :DeltaItemEffect:
      Quantity: 1
      Rounding: None
      Item:
        :ar_Template:
          pack: $pack
          screen: ST
          path: $item
      SlotType:
        :MainBaseSlots: Stores
      modifierStorage: null

  # Adds new items to future bases.
  # This is always assumed to be infinite because nothing else makes sense.
  # (I can always redefine it later.)
  $AddItemToFutureBases:
    $args:
      - $pack
      - $item
    :ADelegateEffect:
      selector:
        :TaggedEntitySe:
          Tag: Xenonauts.Common.CampaignTag
      effects:
        - :AddItemToGeoBaseRequisitionEffect:
            Quantity: Infinity
            SlotType:
              :MainBaseSlots: Stores
            Item:
              :ar_Template:
                pack: $pack
                screen: ST
                path: $item
            modifierStorage: null
      modifierStorage: null
  
  # Flattens a RangeComponent into a single value.
  $FlatRange:
    $args:
      - $val
    _min: $val
    _val: $val
    _max: $val

  # Sets up a body ID for a default unit of the given species.
  $Species:
    $args:
      - $species
    :BodyID:
      species: $species
      group: default
      ethnicity: default
      gender: default

  # Sets up a body ID for a Xenonaut unit of the given species.
  $XenonautSpecies:
    $args:
      - $species
    $Species:
      $species: $species
      :BodyID:
        group: xenonaut

  # Builds a BodyIDPq for a given species with all other props omitted.
  # Essentially $Species, but for prerequisites.
  $SpeciesPq:
    $args:
      - $species
    :BodyIDPq:
      Species:
        "&v": $species
      Group: false
      Ethnicity: false
      Gender: false
      Variant: Unlocks
      modifierStorage: null

  # Builds a prerequisite to check for the actor's rank (e.g. sentry guns).
  $RankPq:
    $args:
      - $rank
    :DLEPq:
      Target: Xenonauts.Common.Components.Combatant.Rank
      Compare: Is
      Value:
        :Rank: $rank
      UseInventoryType: false
      Variant: Unlocks
      modifierStorage: null

  # Negates all child prerequisites.
  $NonePq:
    $args:
      - $reqs
    :LogicPq:
      Operator: None
      Number: 0
      Children: $reqs
      Variant: Unlocks
      modifierStorage: null

  # Requires all child prerequisites to be met.
  $AndPq:
    $args:
      - $reqs
    :LogicPq:
      Operator: All
      Number: 0
      Children: $reqs
      Variant: Unlocks
      modifierStorage: null

  # Requires any child prerequisites to be met.
  $OrPq:
    $args:
      - $reqs
    :LogicPq:
      Operator: Any
      Number: 0
      Children: $reqs
      Variant: Unlocks
      modifierStorage: null

  # Builds a restriction against equipping an item in ground combat
  # based on the inventory slot owner.
  $SlotOwnerPq:
    $args:
      - $mode
      - $reqs
    :ADelegatePq:
      Operator: $mode
      Number: 0
      selector:
        :OneEntitySe:
          OneComponent: Xenonauts.Common.Components.Item.InventorySlotOwnerLink
      prerequisites: $reqs

  # Builds a set of restrictions against equipping an item in ground combat.
  $GCEquipReqs:
    $args:
      - $reqs
    :InventorySlotAddPrerequisites:
      - :IgnoreInTestWrapperPq:
          Prerequisite:
            :ForwardInventorySlotPq:
              Forward: Slot
              Delegate: $reqs
              Variant: Unlocks
              modifierStorage: null
          Variant: Unlocks
          modifierStorage: null
$schema: 0.4.0
$aliases:
  InventoryTemplateValueType: &InventoryTemplateValueType 
    $valuetype: Common.Content.AssetReference`1[[Artitas.Template, Assembly-CSharp, Version=0.0.0.0, Culture=neutral, PublicKeyToken=null]]

strategy:
  loadout_profiles:
    # Herald Loadout
    servitor:
      parent:
        screen: ST
        path: masters/loadout_profiles/mechanical
      name: servitor
      $path: ""
      components:
        :InventoryTemplate:
          $content: ST-::-loadout/combatant/servitor^default^servitor^default.json
          <<: *InventoryTemplateValueType
        :LocalizableGUID: []
        :Name: Herald
        :Portrait: ST-::-loadout_profile/none.png

    # Harbinger Loadout
    servitor_heavy:
      parent:
        screen: ST
        path: loadout_profiles/servitor
      name: servitor_heavy
      $path: ""
      components:
        :InventoryTemplate:
          $content: ST-::-loadout/combatant/servitor^default^servitor_heavy^default.json
          <<: *InventoryTemplateValueType
        :Name: Harbinger

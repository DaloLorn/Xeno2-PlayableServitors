$schema: 0.4.0
$aliases:
  Shared: &Shared
    $NoLocale: {}
    :Portrait: GC-::-ui/item/corpse/servitor^default^servitor^dead^default^default.png
    :SortCategoriesReference:
      - :ar_Template:
          screen: ST
          path: sort_categories/project/engineering/vehicles

strategy:
  projects/engineering:
    # Harbinger
    vehicle_servitor_heavy:
      parent:
        screen: ST
        path: masters/projects/engineering/engineering_duration0
      name: vehicle_servitor_heavy
      $path: ""
      components:
        <<: *Shared
        :Description: Produces one Harbinger Support Platform, a tougher Herald
          with improved weapons and armor.
        :Name: Harbinger Support Platform
        :Prerequisites:
          - $HasCosts:
              - $CashCost: 250000
        :ProjectFSM:
          TriggerEffects: {}
          EntryEffects:
            Finished:
              - $RecruitActor:
                  $amount: 1
                  $actor: actor/combatant/mechanical/xenonauts/servitor_heavy
              - $MyBaseEffect:
                  - $AddItem:
                      $amount: 1
                      $item: item/armour/servitor_heavy
                  - $AddItem:
                      $amount: 1
                      $item: item/weapon/alien_servitor_cannon_heavy
                  - $AddItem:
                      $amount: Infinity
                      $item: item/ammo/alien_servitor_cell_heavy
              - $AddItemToFutureBases: item/ammo/alien_servitor_cell_heavy
          ExitEffects: {}
          State: Setup
        :SortOrder: 283

    # Herald
    vehicle_servitor:
      parent:
        screen: ST
        path: masters/projects/engineering/engineering_duration0
      name: vehicle_servitor
      $path: ""
      components:
        <<: *Shared
        :Description: Produces one Herald Support Platform, a
          refurbished alien Servitor that can support your soldiers in battle.
        :Name: Herald Support Platform
        :Prerequisites:
          - $HasCosts:
              - $CashCost: 250000
        :ProjectFSM:
          TriggerEffects: {}
          EntryEffects:
            Finished:
              - $RecruitActor:
                  $amount: 1
                  $actor: actor/combatant/mechanical/xenonauts/servitor
              - $MyBaseEffect:
                  - $AddItem:
                      $amount: 1
                      $item: item/armour/servitor
                  - $AddItem:
                      $amount: 1
                      $item: item/weapon/alien_servitor_cannon
                  - $AddItem:
                      $amount: Infinity
                      $item: item/ammo/alien_servitor_cell
              - $AddItemToFutureBases: item/ammo/alien_servitor_cell
          ExitEffects: {}
          State: Setup
        :SortOrder: 282

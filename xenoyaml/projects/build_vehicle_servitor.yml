$schema: 0.4.0
$aliases:
  Shared: &Shared
    :LocalizableGUID: []
    :Portrait: GC-::-ui/item/corpse/servitor^default^servitor^dead^default^default.png
    :SortCategoriesReference:
      - :ar_Template:
          screen: ST
          path: sort_categories/project/engineering/vehicles
  RecruitActorWrapper: &RecruitActorWrapper
    Arg0Selector:
      :PlayerSe:
        Player: xenonauts
    Arg1Selector:
      :MyGeoBaseSe:
        Target: null
    modifierStorage: null
  RecruitActor: &RecruitActor
    Quantity:
      _min: 1
      _val: 1
      _max: 1
    IgnoreCost: true
    Delayed: false
    Randomize: true
    modifierStorage: null
  AddItem: &AddItem
    Quantity: 1
    Rounding: None
    SlotType:
      :MainBaseSlots: Stores
    modifierStorage: null
  AddItemToFutureBases: &AddItemToFutureBases
    Quantity: Infinity
    SlotType:
      :MainBaseSlots: Stores
    modifierStorage: null
  ProjectCosts: &ProjectCosts
    Operator: All
    Number: 0
    Variant: Cost
    modifierStorage: null


strategy:
  projects/engineering:

    # Harbinger
    vehicle_servitor_heavy:
      parent:
        screen: ST
        path: masters/projects/engineering/engineering_duration0
      name: vehicle_servitor_heavy
      $path: ""
      components:
        <<: *Shared
        :Description: Produces one Harbinger Support Platform, a tougher Herald
          with improved weapons and armor.
        :LocalizableGUID: []
        :Name: Harbinger Support Platform
        :Portrait: GC-::-ui/item/corpse/servitor^default^servitor^dead^default^default.png
        :Prerequisites:
          - :ADelegatePq:
              <<: *ProjectCosts
              selector:
                :PlayerSe:
                  Player: xenonauts
              prerequisites:
                - :CashPq:
                    value: 250000
                    Variant: Cost
                    modifierStorage: null
        :ProjectFSM:
          TriggerEffects: {}
          EntryEffects:
            Finished:
              - :BinaryArgsDelegateEffect:

                  Effect:
                    <<: *RecruitActorWrapper
                    :GenerateAndRecruitActorEffect:
                      <<: *RecruitActor
                      TemplateRef:
                        :ar_Template:
                          screen: ST
                          path: actor/combatant/mechanical/xenonauts/servitor_heavy
              - :ADelegateEffect:
                  selector:
                    :MyGeoBaseSe:
                      Target: null
                  effects:
                    - :DeltaItemEffect:
                        <<: *AddItem
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/armour/servitor_heavy
                    - :DeltaItemEffect:
                        <<: *AddItem
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/weapon/alien_servitor_cannon_heavy
                    - :DeltaItemEffect:
                        <<: *AddItem
                        Quantity: Infinity
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/ammo/alien_servitor_cell_heavy
                  modifierStorage: null
              - :ADelegateEffect:
                  selector:
                    :TaggedEntitySe:
                      Tag: Xenonauts.Common.CampaignTag
                  effects:
                    - :AddItemToGeoBaseRequisitionEffect:
                        <<: *AddItemToFutureBases
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/ammo/alien_servitor_cell_heavy
                  modifierStorage: null
          ExitEffects: {}
          State: Setup
        :SortOrder: 283

    # Herald
    vehicle_servitor:
      parent:
        screen: ST
        path: masters/projects/engineering/engineering_duration0
      name: vehicle_servitor
      $path: ""
      components:
        <<: *Shared
        :Description: Produces one Herald Support Platform, a
          refurbished alien Servitor that can support your soldiers in battle.
        :Name: Herald Support Platform
        :Prerequisites:
          - :ADelegatePq:
              <<: *ProjectCosts
              selector:
                :PlayerSe:
                  Player: xenonauts
              prerequisites:
                - :CashPq:
                    value: 250000
                    Variant: Cost
                    modifierStorage: null
        :ProjectFSM:
          TriggerEffects: {}
          EntryEffects:
            Finished:
              - :BinaryArgsDelegateEffect:
                  <<: *RecruitActorWrapper
                  Effect:
                    :GenerateAndRecruitActorEffect:
                      <<: *RecruitActor
                      TemplateRef:
                        :ar_Template:
                          screen: ST
                          path: actor/combatant/mechanical/xenonauts/servitor
              - :ADelegateEffect:
                  selector:
                    :MyGeoBaseSe:
                      Target: null
                  effects:
                    - :DeltaItemEffect:
                        <<: *AddItem
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/armour/servitor
                    - :DeltaItemEffect:
                        <<: *AddItem
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/weapon/alien_servitor_cannon
                    - :DeltaItemEffect:
                        <<: *AddItem
                        Quantity: Infinity
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/ammo/alien_servitor_cell
                  modifierStorage: null
              - :ADelegateEffect:
                  selector:
                    :TaggedEntitySe:
                      Tag: Xenonauts.Common.CampaignTag
                  effects:
                    - :AddItemToGeoBaseRequisitionEffect:
                        <<: *AddItemToFutureBases
                        Item:
                          :ar_Template:
                            screen: ST
                            path: item/ammo/alien_servitor_cell
                  modifierStorage: null
          ExitEffects: {}
          State: Setup
        :SortOrder: 282

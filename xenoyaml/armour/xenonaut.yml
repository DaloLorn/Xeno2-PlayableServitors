$schema: 0.4.0
$aliases:
  SteelPlating: &SteelPlating
    $HitPoints: 45
  AlloyPlating: &AlloyPlating
    $HitPoints: 70
    $ArmorHardness: 10
  CeramitePlating: &CeramitePlating
    $HitPoints: 105
    $ArmorHardness: 20
  ShieldedPlating: &ShieldedPlating
    $HitPoints: 165
    $ArmorHardness: 30
  SteelPlatingARES: &SteelPlatingARES
    <<: *SteelPlating
    $HitPoints: 50
  AlloyPlatingARES: &AlloyPlatingARES
    <<: *AlloyPlating
    $HitPoints: 75
  CeramitePlatingARES: &CeramitePlatingARES
    <<: *CeramitePlating
    $HitPoints: 115
  ShieldedPlatingARES: &ShieldedPlatingARES
    <<: *ShieldedPlating
    $HitPoints: 180
$builders:
  $HeavyPlating:
    $args:
      - $hp
    $HeavyArmour:
      $hp: $hp
    :Description: "Heavy Plating is an optional module that increases the
      {{_context.tooltips.concept filename:\"armour\" text:\"Armour\"}} of this
      vehicle, making it tougher.\r

      \r

      Unfortunately, the increased weight will also reduce the
      {{_context.tooltips.concept filename:\"tu\" text:\"Time Units\"}} of the
      vehicle, making it slower and reducing its rate of fire." 
  $HeavyArmour:
    $args:
      - $hp
      - $hpType: Additive
    :Modifiers:
      - $ModSoldierStat:
          $stat: Xenonauts.Common.Stats.HitPoints
          $amount: $hp
          $modType: $hpType
      - $PropagatedModifier:
        - $ModSoldierStat:
            $stat: Common.Components.UnmodifiedTimeUnits
            $modType: Multiplication
            $min: 1
            $amount: 0.8
            $max: 1
    $NoLocale: {}
    :Description: "Heavy Armour is an optional module that increases the
      {{_context.tooltips.concept filename:\"armour\" text:\"Armour\"}} of this
      soldier, making them tougher.\r

      \r

      Unfortunately, the increased weight will also reduce the
      {{_context.tooltips.concept filename:\"tu\" text:\"Time Units\"}} of the
      wearer, making them slower and reducing their rate of fire." 

groundcombat:
  item:

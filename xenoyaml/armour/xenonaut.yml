$schema: 0.4.0
$aliases:
  SteelPlating: &SteelPlating
    :HitPoints:
      $MaxRange:
        $val: 45
  AlloyPlating: &AlloyPlating
    :HitPoints:
      $MaxRange:
        $val: 70
    :ArmourPenetrationReduction:
      _min: 0
      _val: 10
      _max: 100
  CeramitePlating: &CeramitePlating
    :HitPoints:
      $MaxRange:
        $val: 105
    :ArmourPenetrationReduction:
      _min: 0
      _val: 20
      _max: 100
  ShieldedPlating: &ShieldedPlating
    :HitPoints:
      $MaxRange:
        $val: 165
    :ArmourPenetrationReduction:
      _min: 0
      _val: 30
      _max: 100
  SteelPlatingARES: &SteelPlatingARES
    <<: *SteelPlating
    :HitPoints:
      $MaxRange:
        $val: 50
  AlloyPlatingARES: &AlloyPlatingARES
    <<: *AlloyPlating
    :HitPoints:
      $MaxRange:
        $val: 75
  CeramitePlatingARES: &CeramitePlatingARES
    <<: *CeramitePlating
    :HitPoints:
      $MaxRange:
        $val: 115
  ShieldedPlatingARES: &ShieldedPlatingARES
    <<: *ShieldedPlating
    :HitPoints:
      $MaxRange:
        $val: 180
$builders:
  $HeavyPlating:
    $args:
      - $hp
    $HeavyArmour:
      $hp: $hp
    :Description: "Heavy Plating is an optional module that increases the
      {{_context.tooltips.concept filename:\"armour\" text:\"Armour\"}} of this
      vehicle, making it tougher.\r

      \r

      Unfortunately, the increased weight will also reduce the
      {{_context.tooltips.concept filename:\"tu\" text:\"Time Units\"}} of the
      vehicle, making it slower and reducing its rate of fire." 
  $HeavyArmour:
    $args:
      - $hp
    :Modifiers:
      - :36:
          Target: Xenonauts.Common.Stats.HitPoints
          Type: Additive
          DeltaMinimum: 0
          DeltaValue: $hp
          DeltaMaximum: $hp
          MinimumRounding: None
          ValueRounding: None
          MaximumRounding: None
          Precedence: 0
          UniqueKey: false
      - :36:
          Target: Common.Components.UnmodifiedTimeUnits
          Type: Multiplication
          DeltaMinimum: 1
          DeltaValue: 0.8
          DeltaMaximum: 1
          MinimumRounding: None
          ValueRounding: None
          MaximumRounding: None
          Precedence: 0
          UniqueKey: false
    $NoLocale: {}
    :Description: "Heavy Armour is an optional module that increases the
      {{_context.tooltips.concept filename:\"armour\" text:\"Armour\"}} of this
      soldier, making them tougher.\r

      \r

      Unfortunately, the increased weight will also reduce the
      {{_context.tooltips.concept filename:\"tu\" text:\"Time Units\"}} of the
      wearer, making them slower and reducing their rate of fire." 


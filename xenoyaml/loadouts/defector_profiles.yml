$schema: 0.4.0
$aliases:
  InventoryTemplateValueType: &InventoryTemplateValueType 
    $valuetypekey: ar_Template

strategy:
  loadout_profiles:
    # Psyon Loadout
    psyon_defector:
      parent:
        screen: ST
        path: masters/loadout_profiles/humanoid
      name: psyon
      $path: ""
      components:
        :Prerequisites:
          - :InventoryTaxonomyIsAPq:
              Target: Loadout/Combatant/Psyon
              Variant: Cost
              modifierStorage: null
        :InventoryTemplate:
          $content: ST-::-loadout/combatant/psyon^default^noncom^default.json
          <<: *InventoryTemplateValueType
        $NoLocale: {}
        :Name: Psyon Defector
        :Portrait: ST-::-loadout_profile/rifleman.png


$schema: 0.4.0
$builders:
  $HeavyServitorOnly:
    $GCEquipReqs:
      $SlotOwnerPq:
        $mode: All
        $reqs:
          - $IsServitor: {}
          - $RankPq: servitor_heavy

  $ServitorOnly:
    $GCEquipReqs:
      $SlotOwnerPq:
        $mode: All
        $reqs:
          - $IsServitor: {}
          - $RankPq: servitor

  $HeavyMentarchOnly:
    $GCEquipReqs:
      $SlotOwnerPq:
        $mode: All
        $reqs:
          - $IsMentarch: {}
          - $RankPq: mentarch_heavy

  $MentarchOnly:
    $GCEquipReqs:
      $SlotOwnerPq:
        $mode: All
        $reqs:
          - $IsMentarch: {}
          - $RankPq: mentarch

  $HeavyCyberdroneOnly:
    $GCEquipReqs:
      $SlotOwnerPq:
        $mode: All
        $reqs:
          - $IsCyberdrone: {}
          - $RankPq: cyberdrone_heavy

  $CyberdroneOnly:
    $GCEquipReqs:
      $SlotOwnerPq:
        $mode: All
        $reqs:
          - $IsCyberdrone: {}
          - $RankPq: cyberdrone

  $HitPoints:
    $args: $val
    :HitPoints:
      $MaxRange: $val

  $ArmorHardness:
    $args: $hardness
    :ArmourPenetrationReduction:
      _min: 0
      _val: $hardness
      _max: 100

  $UnequippedReq:
    :DLEPq:
      Target: Xenonauts.Common.Components.Item.CombatantSlots
      Compare: Overlaps
      Value:
        :CombatantSlots: Belt,Backpack
      UseInventoryType: true
      Variant: Unlocks
      modifierStorage: null

  $ArmorTypeReq:
    $args: $armor
    :AManyDelegatePq:
      Operator: Any
      Number: 0
      selector:
        :ManyEntitySe:
          ManyComponent: Xenonauts.Common.Components.Item.InventorySlotsLink
      prerequisite:
        $AndPq:
          - :DLEPq:
              Target: Xenonauts.Common.Components.Item.CombatantSlots
              Compare: Is
              Value:
                :CombatantSlots: Armour
              UseInventoryType: true
              Variant: Unlocks
              modifierStorage: null
          - :AManyDelegatePq:
              Operator: Any
              Number: 0
              selector:
                :ManyEntitySe:
                  ManyComponent: Xenonauts.Common.Components.Item.InventoryLink
              prerequisite:
                :DLEPq:
                  Target: Xenonauts.GroundCombat.Assets.Identifiers.ArmorIdentifierComponent
                  Compare: Overlaps
                  Value:
                    :ArmorID: $armor
                  UseInventoryType: false
                  Variant: Unlocks
                  modifierStorage: null
              Variant: Unlocks
              modifierStorage: null
      Variant: Unlocks
      modifierStorage: null

  $NotColossus:
    $NonePq:
      - $ArmorTypeReq: colossus

  $NoHandsReq:
    $OrPq:
      - $IsServitor: {}
      - $IsMechanical: {}
      - $IsCyberdrone: {}
      - $IsMentarch: {}
      - $IsReaper: {}

  $TwoHandedReq:
    $NonePq:
      - $IsSecton: {}
      - $NoHandsReq: {}

  $CloakingDevice:
    $args: $magnitude
    :35:
      Precedence: 0
      UniqueKey: false
      _modificationType: Xenonauts.GroundCombat.Components.GCAbilityDefinitionsComponent
      Added:
        - :94:
            Bonus: $magnitude
            FlatBonus: true
            Target: Defence
            ActivationTrigger: MyTurnStart
            DeactivationTrigger: AnyDamage
            Name: Cloaking Field
            Tooltip: false

  # Bumps a modifier up into a parent's modifier.
  # Useful for armor modules or ammo trying to affect
  # the soldier wearing the armor or holding the weapon.
  $PropagatedModifier:
    $args:
      - $modifiers
      - $precedence: 0
      - $key: false
    :35:
      Precedence: $precedence
      UniqueKey: $key
      _modificationType: Common.Components.ModifiersComponent
      Added: $modifiers

  $ModSoldierStat:
    $args:
      - $stat
      - $amount
      - $modType: Additive
      - $precedence: 0
      - $key: false
      - $min: 0
      - $max: $amount
    :36:
      Target: $stat
      Type: $modType
      DeltaMinimum: $min
      DeltaValue: $amount
      DeltaMaximum: $max
      MinimumRounding: None
      ValueRounding: None
      MaximumRounding: None
      Precedence: $precedence
      UniqueKey: $key

  $Weight:
    $args: $val
    :Weight:
      $MaxRange: $val

  $ArmorPenetration:
    $args: $val
    :ArmourPenetration:
      $Range:
        $min: 0
        $val: $val
        $max: 100

  $ArmorDestruction:
    $args: $val
    :ArmourDestruction:
      $MaxRange: $val

  $OptimalRange:
    $args: $range
    :LongRange:
      $Range: 
        $min: 0
        $val: $range
        $max: &FloatMax 3.402823e+38

  $RangeDropoff:
    $args: $dropoff
    :LongRangeBonus:
      $Range:
        $min: 0
        $val: $dropoff
        $max: 1

  $CloseRange:
    $args: $range
    :ShortRange:
      $Range:
        $min: 0
        $val: $range
        $max: *FloatMax

  $RangeBonus:
    $args: $bonus
    :ShortRangeBonus:
      $Range:
        $min: 0
        $val: $bonus
        $max: 1

  $ReloadCost:
    $args: $cost
    :ReloadCost:
      $Range:
        $min: 0
        $val: $cost
        $max: *FloatMax

  $StationaryBonus:
    $args: $val
    NoMoveAccuracyBonus:
      "&v":
        $Range: $val

  $ShotAbility:
    $args:
      - $mode
      - $trajectory: Straight
      - $stationaryBonus: false
      - $ik: true
      - $useAmmo: true
      - $shots: 1
      - $shotDelay: 0.1
      - $name
      - $absoluteCost: 0
      - $percentCost
      - $importanceScale: 1
      - $crosshair
      - $accuracy
      - $tooltip: false
    :114:
      FireMode: $mode
      Trajectory: $trajectory
      NoMoveAccuracyBonus: $stationaryBonus
      Ik: $ik
      ConsumesAmmo: $useAmmo
      Shots: $shots
      ShotsDelay: $shotDelay
      Name: $name
      AbsoluteCostTimeUnits: $absoluteCost
      PercentageCostTimeUnits: $percentCost
      ImportanceScale: $importanceScale
      Crosshair: $crosshair
      Accuracy: $accuracy
      Tooltip: $tooltip

  $DropItem:
    $args:
      - $pack: $none
      - $screen: ST
      - $item
      - $amount: 1
    Elements:
      - $RandomResult:
          $ItemDrop:
            $pack: $pack
            $screen: $screen
            $item: $item
            $amount: $amount

  $ItemDrop:
    $args:
      - $pack: $none
      - $screen: ST
      - $item
      - $amount: 1
    :0:
      parent:
        pack: $pack
        screen: $screen
        path: $item
      components:
        :Quantity:
          _min: 0
          _val: $amount
          _max: Infinity
    

  $RandomResult:
    $args:
      - $weight: 1
      - $result
    $template:
      - $weight
      - $result

$schema: 0.4.0
$builders:
  # Builds a BodyIDPq for a given species with all other props omitted.
  # Essentially $Species, but for prerequisites.
  $SpeciesPq:
    $args: 
      - $species
      - $group: false
      - $ethnicity: false
      - $gender: false
    :BodyIDPq:
      Species:
        "&v": $species
      Group: $group
      Ethnicity: $ethnicity
      Gender: $gender
      Variant: Unlocks
      modifierStorage: null

  $V:
    $args: $val
    "&v": $val

  # Crunched the Species enum out of source code.
  # In case I forget: I made a slightly more generic version of the
  # JS I used to do it, and put it in Decompiled/helper.txt.
  # Should be helpful if I ever need to do it for, say, RoleGroup...

  $IsDefault:  
    $SpeciesPq: default
  $IsAndron:
    $SpeciesPq: andron
  $IsCleaner:
    $SpeciesPq: cleaner
  $IsHuman:
    $SpeciesPq: human
  $IsCyberdrone:
    $SpeciesPq: drone
  $IsServitor:
    $SpeciesPq: servitor
  $IsMechanical:
    $SpeciesPq: mechanical
  $IsReaper:
    $SpeciesPq: reaper
  $IsSebillian:
    $SpeciesPq: sebillian
  $IsWraith:
    $SpeciesPq: wraith
  $IsMantid:
    $SpeciesPq: mantid
  $IsPsyon:
    $SpeciesPq: psyon
  $IsSecton:
    $SpeciesPq: secton
  $IsMentarch:
    $SpeciesPq: mentarch
  $IsEternal:
    $SpeciesPq: eternal